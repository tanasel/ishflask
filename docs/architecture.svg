<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">ishflask architecture diagram</title>
  <desc id="desc">Client sends a GET request to a Flask app, which queries SQLite and returns JSON rows. The database never leaves the server.</desc>
  <defs>
    <marker id="arrow-accent" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10 Z" fill="#64748b"/>
    </marker>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="960" height="360" fill="#f8fafc"/>

  <g font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <rect x="56" y="86" width="220" height="118" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#soft-shadow)"/>
    <text x="166" y="134" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Client</text>
    <text x="166" y="164" text-anchor="middle" font-size="17" fill="#475569">(browser / Python requests)</text>

    <rect x="370" y="86" width="220" height="118" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="3" filter="url(#soft-shadow)"/>
    <text x="480" y="134" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Flask app</text>
    <text x="480" y="164" text-anchor="middle" font-size="17" fill="#475569">(app.py)</text>

    <rect x="684" y="86" width="220" height="118" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#soft-shadow)"/>
    <text x="794" y="134" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">SQLite</text>
    <text x="794" y="164" text-anchor="middle" font-size="17" fill="#475569">(medical.db)</text>

    <line x1="286" y1="120" x2="358" y2="120" stroke="#2563eb" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-accent)"/>
    <text x="322" y="97" text-anchor="middle" font-size="17" font-weight="650" fill="#1e40af">GET /appointments/D1</text>

    <line x1="600" y1="120" x2="672" y2="120" stroke="#2563eb" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-accent)"/>
    <text x="636" y="97" text-anchor="middle" font-size="17" font-weight="650" fill="#1e40af">SELECT ... JOIN</text>

    <path d="M370 190 C300 252 214 252 156 210" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-muted)"/>
    <text x="264" y="259" text-anchor="middle" font-size="17" font-weight="650" fill="#475569">JSON rows</text>

    <text x="480" y="318" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">The database never leaves the server.</text>
  </g>
</svg>
